services:
  # --- Bases de datos ---
  auth-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: auth_db
    ports:
      - "3306:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  posts-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: posts_db
    ports:
      - "3307:3306"
    volumes:
      - posts_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  social-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: social_db
    ports:
      - "3308:3306"
    volumes:
      - social_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # --- Microservicios ---
  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
      GOOGLE_CLIENT_ID: 955206169841-jpg61cp2k46i1bdfbg7mujqukqqfsbgs.apps.googleusercontent.com
    depends_on:
      auth-db:
        condition: service_healthy

  posts-service:
    build: ./posts-service
    ports:
      - "8002:8000"
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: posts-db
      DB_PORT: 3306
      DB_DATABASE: posts_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
    depends_on:
      posts-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  profile-social-service:
    build: ./profile-social-service
    ports:
      - "8003:8000"
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: social-db
      DB_PORT: 3306
      DB_DATABASE: social_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
    depends_on:
      social-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  # --- Chat ---
  chat-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: chat_db
    ports:
      - "3309:3306"
    volumes:
      - chat_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  chat-service:
    build: ./chat-service
    ports:
      - "8004:8000"
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: chat-db
      DB_PORT: 3306
      DB_DATABASE: chat_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
    depends_on:
      chat-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  # --- Frontend ---
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - posts-service
      - profile-social-service
      - chat-service

volumes:
  auth_db_data:
  posts_db_data:
  social_db_data:
  chat_db_data:
