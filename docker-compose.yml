services:
  # --- Bases de datos ---
  auth-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: auth_db
    ports:
      - "3306:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  posts-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: posts_db
    ports:
      - "3307:3306"
    volumes:
      - posts_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  social-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: social_db
    ports:
      - "3308:3306"
    volumes:
      - social_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # --- Microservicios ---
  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./auth-service/public/auth-uploads:/app/public/auth-uploads
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
      GOOGLE_CLIENT_ID: 955206169841-jpg61cp2k46i1bdfbg7mujqukqqfsbgs.apps.googleusercontent.com
    depends_on:
      auth-db:
        condition: service_healthy

  posts-service:
    build: ./posts-service
    ports:
      - "8002:8000"
    volumes:
      - ./posts-service/public/uploads:/app/public/uploads
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: posts-db
      DB_PORT: 3306
      DB_DATABASE: posts_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
    depends_on:
      posts-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  profile-social-service:
    build: ./profile-social-service
    ports:
      - "8003:8000"
    volumes:
      - ./profile-social-service/public/group-covers:/app/public/group-covers
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: social-db
      DB_PORT: 3306
      DB_DATABASE: social_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
    depends_on:
      social-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  # --- Chat ---
  chat-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: chat_db
    ports:
      - "3309:3306"
    volumes:
      - chat_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  chat-service:
    build: ./chat-service
    ports:
      - "8004:8000"
    volumes:
      - ./chat-service/public/chat-uploads:/app/public/chat-uploads
    environment:
      APP_KEY: base64:randomkey
      DB_CONNECTION: mysql
      DB_HOST: chat-db
      DB_PORT: 3306
      DB_DATABASE: chat_db
      DB_USERNAME: root
      DB_PASSWORD: rootpass
      JWT_SECRET: super-secret-key-change-in-production
    depends_on:
      chat-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  ovenmediaengine:
    image: airensoft/ovenmediaengine:latest
    restart: unless-stopped
    environment:
      OME_HOST_IP: ${OME_HOST_IP:-127.0.0.1}
      OME_WEBRTC_CANDIDATE_PORT: 10000/udp
      OME_WEBRTC_TCP_RELAY_PORT: 3478
    ports:
      - "1935:1935"
      - "3333:3333/tcp"
      - "3333:3333/udp"
      - "3334:3334/tcp"
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "8080:8080/tcp"
      - "10000:10000/udp"
      - "10001:10001/udp"
      - "10002:10002/udp"
      - "10003:10003/udp"
      - "10004:10004/udp"
      - "10005:10005/udp"
    volumes:
      - ./infrastructure/ome/origin_conf/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml:ro

  # --- Frontend ---
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/srv
      - ./frontend/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - auth-service
      - posts-service
      - profile-social-service
      - chat-service

volumes:
  auth_db_data:
  posts_db_data:
  social_db_data:
  chat_db_data:
