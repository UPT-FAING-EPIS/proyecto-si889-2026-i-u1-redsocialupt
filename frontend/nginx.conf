server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=5s;

    # ── Frontend estático ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Imágenes subidas al posts-service ─────────────────────────
    # /uploads/<filename> → posts-service:8000/uploads/<filename>
    location ~ ^/uploads/(.+)$ {
        set $backend http://posts-service:8000;
        proxy_pass $backend/uploads/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Imágenes de perfil/banner subidas al auth-service ────────
    location ~ ^/auth-uploads/(.+)$ {
        set $backend http://auth-service:8000;
        proxy_pass $backend/auth-uploads/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/chat-uploads/(.+)$ {
        set $backend http://chat-service:8000;
        proxy_pass $backend/chat-uploads/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Auth Service: /api/auth/* /api/users/* /api/admin/* ────────
    location ~ ^/api/(auth|users|admin)(/.*)?$ {
        set $backend http://auth-service:8000;
        proxy_pass $backend/api/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        # Necesario para uploads de avatar/banner
        client_max_body_size 10M;
    }

    # ── Posts Service: /api/posts/* ────────────────────────────────
    location ~ ^/api/(posts|comments)(/.*)?$ {
        set $backend http://posts-service:8000;
        proxy_pass $backend/api/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        # Necesario para uploads multipart
        client_max_body_size 10M;
    }

    # ── Social Service: /api/directory/* /api/friends/* ────────────
    # Frontend calls /api/directory → Backend expects /api/social/directory
    # Frontend calls /api/friends   → Backend expects /api/social/friends
    location ~ ^/api/(directory|friends)(/.*)?$ {
        set $backend http://profile-social-service:8000;
        proxy_pass $backend/api/social/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    # ── Chat Service: /api/chat/* ──────────────────────────────────
    location ~ ^/api/chat(/.*)?$ {
        set $backend http://chat-service:8000;
        proxy_pass $backend/api/chat$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        client_max_body_size 10M;
    }
}
