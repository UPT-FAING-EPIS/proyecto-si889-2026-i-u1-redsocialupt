server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=5s;

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~* ^/(js|css)/.*\.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy del motor de livestream para publicar WHIP y ver HLS/LLHLS
    # usando el mismo origen del frontend.
    location = /__ome_manifest_pending__ {
        add_header Cache-Control "no-store";
        return 204;
    }

    location ~ ^/ome-ready/.*/master\.m3u8$ {
        rewrite ^/ome-ready/(.*)$ /$1 break;
        proxy_pass http://ovenmediaengine:3333;
        proxy_redirect ~^https?://[^/]+(/.*)$ /ome$1;
        proxy_redirect ~^(/.*)$ /ome$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 20M;
        add_header Cache-Control "no-store";
        proxy_intercept_errors on;
        error_page 404 =204 /__ome_manifest_pending__;
    }

    location ^~ /ome/ {
        rewrite ^/ome/(.*)$ /$1 break;
        proxy_pass http://ovenmediaengine:3333;
        proxy_redirect ~^https?://[^/]+(/.*)$ /ome$1;
        proxy_redirect ~^(/.*)$ /ome$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 20M;
        add_header Cache-Control "no-store";
    }

    location ^~ /ome-ws/ {
        rewrite ^/ome-ws/(.*)$ /$1 break;
        proxy_pass http://ovenmediaengine:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_request_buffering off;
        add_header Cache-Control "no-store";
    }

    location ~ ^/uploads/(.+)$ {
        set $backend http://posts-service:8000;
        proxy_pass $backend/uploads/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/auth-uploads/(.+)$ {
        set $backend http://auth-service:8000;
        proxy_pass $backend/auth-uploads/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/chat-uploads/(.+)$ {
        set $backend http://chat-service:8000;
        proxy_pass $backend/chat-uploads/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/group-covers/(.+)$ {
        set $backend http://profile-social-service:8000;
        proxy_pass $backend/group-covers/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/api/(auth|users|admin)(/.*)?$ {
        set $backend http://auth-service:8000;
        proxy_pass $backend/api/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        client_max_body_size 10M;
    }

    location ~ ^/api/(posts|comments|livestreams)(/.*)?$ {
        set $backend http://posts-service:8000;
        proxy_pass $backend/api/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        client_max_body_size 10M;
    }

    location ~ ^/api/(directory|friends|blocks|groups)(/.*)?$ {
        set $backend http://profile-social-service:8000;
        proxy_pass $backend/api/social/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location ~ ^/api/chat(/.*)?$ {
        set $backend http://chat-service:8000;
        proxy_pass $backend/api/chat$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        client_max_body_size 10M;
    }

    location ~ ^/api/group-posts(/.*)?$ {
        set $backend http://posts-service:8000;
        proxy_pass $backend/api/group-posts$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        client_max_body_size 10M;
    }
}
