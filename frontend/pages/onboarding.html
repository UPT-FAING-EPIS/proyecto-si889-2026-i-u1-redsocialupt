<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UPT Connect - Registro de Datos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
            "upt-blue": "#001256",
            "upt-gold": "#d4af37",
            "on-surface-variant": "#6c757d",
            "outline-variant": "#dee2e6",
            "error": "#ba1a1a"
        },
        "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.5rem",
            "xl": "1.5rem",
            "full": "9999px"
        }
      }
    }
  }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .dot-grid {
        background-color: #f8f9fa;
        background-image: radial-gradient(#d1d5db 0.8px, transparent 0.8px);
        background-size: 24px 24px;
    }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 8px; background: #1a1c1c; color: #fff; font-size: 14px; animation: slideIn .3s ease; }
    .toast.error { background: #ba1a1a; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body class="bg-white dot-grid min-h-screen flex items-center justify-center p-6 relative w-full text-gray-900 overflow-x-hidden">
<div class="flex flex-col items-center w-full max-w-[540px] gap-8 z-10 relative">
<!-- Header Branding -->
<div class="flex flex-col items-center text-center">
<div class="relative mb-4">
<div class="w-14 h-14 bg-upt-blue rounded-2xl flex items-center justify-center">
<span class="text-white font-bold text-2xl">U</span>
</div>
<div class="absolute bottom-0 right-0 transform translate-x-1/4 translate-y-1/4 w-3.5 h-3.5 bg-upt-gold border-2 border-white rounded-full"></div>
</div>
<div class="flex items-center space-x-1.5 mb-1.5">
<span class="text-upt-blue text-2xl font-extrabold tracking-tight">UPT</span>
<span class="text-upt-gold text-2xl font-extrabold tracking-tight">Connect</span>
</div>
<p class="text-on-surface-variant text-xs font-medium">Universidad Privada de Tacna</p>
</div>
<!-- Main Card -->
<main class="w-full bg-white rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.05)] overflow-hidden">
<div class="px-10 py-8 flex flex-col items-center w-full">
<h1 class="text-upt-blue text-xl font-semibold mb-2">Registro de datos</h1>
<p class="text-on-surface-variant text-sm mb-8 text-center">Por favor, completa tu información académica</p>
<form id="onboarding-form" class="flex flex-col gap-5 w-full">
<!-- Nombre Completo -->
<div class="flex flex-col gap-1.5 w-full">
<label class="text-sm font-semibold text-gray-900" for="fullName">Nombre Completo <span class="text-error">*</span></label>
<input class="w-full bg-white border border-outline-variant rounded-xl p-3 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors" id="fullName" placeholder="Ej. Juan Pérez" required type="text"/>
</div>
<!-- Tipo de Usuario -->
<div class="flex flex-col gap-1.5 w-full">
<label class="text-sm font-semibold text-gray-900" for="userType">Tipo de Usuario <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-white border border-outline-variant rounded-xl p-3 appearance-none text-sm text-gray-900 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors pr-10" id="userType" required onchange="toggleStudentFields()">
<option disabled selected value="">Selecciona tu tipo de usuario</option>
<option value="student">Estudiante</option>
<option value="teacher">Docente</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Facultad -->
<div class="flex flex-col gap-1.5 w-full">
<label class="text-sm font-semibold text-gray-900" for="faculty">Facultad <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-white border border-outline-variant rounded-xl p-3 appearance-none text-sm text-gray-900 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors pr-10" id="faculty" required onchange="updateSchools()">
<option disabled selected value="">Selecciona tu facultad</option>
<option value="FAING">Facultad de Ingeniería (FAING)</option>
<option value="FACEM">Facultad de Ciencias Empresariales (FACEM)</option>
<option value="FAEDCOH">Facultad de Educación, Cs. de la Comunicación y Humanidades (FAEDCOH)</option>
<option value="FADE">Facultad de Derecho y Ciencias Políticas (FADE)</option>
<option value="FACSA">Facultad de Ciencias de la Salud (FACSA)</option>
<option value="FAU">Facultad de Arquitectura y Urbanismo (FAU)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Escuela -->
<div class="flex flex-col gap-1.5 w-full">
<label class="text-sm font-semibold text-gray-900" for="school">Escuela Profesional <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-white border border-outline-variant rounded-xl p-3 appearance-none text-sm text-gray-900 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors pr-10" id="school" required disabled>
<option disabled selected value="">Primero selecciona tu facultad</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Ciclo -->
<div class="flex flex-col gap-1.5 w-full" id="cycle-container">
<label class="text-sm font-semibold text-gray-900" for="cycle">Ciclo Académico <span class="text-error">*</span></label>
<div class="relative">
<select class="w-full bg-white border border-outline-variant rounded-xl p-3 appearance-none text-sm text-gray-900 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors pr-10" id="cycle" required>
<option disabled selected value="">Selecciona tu ciclo actual</option>
<option value="1">I Ciclo</option>
<option value="2">II Ciclo</option>
<option value="3">III Ciclo</option>
<option value="4">IV Ciclo</option>
<option value="5">V Ciclo</option>
<option value="6">VI Ciclo</option>
<option value="7">VII Ciclo</option>
<option value="8">VIII Ciclo</option>
<option value="9">IX Ciclo</option>
<option value="10">X Ciclo</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Código de Estudiante -->
<div class="flex flex-col gap-1.5 w-full" id="code-container">
<label class="text-sm font-semibold text-gray-900" for="studentCode">Código de Estudiante <span class="text-error">*</span></label>
<input class="w-full bg-white border border-outline-variant rounded-xl p-3 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors" id="studentCode" placeholder="Ej. 2024001234" required type="text" inputmode="numeric" pattern="[0-9]{1,10}" maxlength="10"/>
</div>
<!-- Correo Institucional -->
<div class="flex flex-col gap-1.5 w-full">
<label class="text-sm font-semibold text-gray-900" for="email">Correo Institucional <span class="text-error">*</span></label>
<input class="w-full bg-white border border-outline-variant rounded-xl p-3 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-upt-blue focus:ring-1 focus:ring-upt-blue transition-colors" id="email" pattern=".*@virtual\.upt\.pe$" placeholder="usuario@virtual.upt.pe" required type="email"/>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 flex items-center justify-center gap-2 py-2.5 px-6 bg-upt-blue text-white rounded-xl font-semibold text-[14px] hover:bg-opacity-90 transition-colors duration-200 outline-none focus:ring-2 focus:ring-offset-2 focus:ring-upt-blue" type="submit" id="btn-submit">
    Siguiente
    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</div>
</main>
</div>
<!-- Footer -->
<footer class="absolute bottom-8 w-full text-center left-0">
<p class="text-on-surface-variant text-[10px] font-medium tracking-[0.2em] uppercase opacity-60">
    UPT Connect — Universidad Privada de Tacna
</p>
</footer>

<script src="../js/api.js"></script>
<script>
  const FACULTY_SCHOOLS = {
    'FAING': [
      'Ingeniería Civil',
      'Ingeniería de Sistemas',
      'Ingeniería Electrónica',
      'Ingeniería Agroindustrial',
      'Ingeniería Ambiental',
      'Ingeniería Industrial'
    ],
    'FACEM': [
      'Ciencias Contables y Financieras',
      'Ingeniería Comercial',
      'Administración de Negocios Internacionales',
      'Administración Turística y Hotelera',
      'Economía y Microfinanzas'
    ],
    'FAEDCOH': [
      'Educación',
      'Ciencias de la Comunicación',
      'Psicología',
      'Humanidades'
    ],
    'FADE': ['Derecho'],
    'FACSA': [
      'Medicina Humana',
      'Odontología',
      'Tecnología Médica: Laboratorio Clínico y Anatomía Patológica',
      'Tecnología Médica: Terapia Física y Rehabilitación'
    ],
    'FAU': ['Arquitectura']
  };

  function updateSchools() {
    const faculty = document.getElementById('faculty').value;
    const schoolSel = document.getElementById('school');
    schoolSel.innerHTML = '<option disabled selected value="">Selecciona tu escuela</option>';
    const schools = FACULTY_SCHOOLS[faculty] || [];
    schools.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      schoolSel.appendChild(opt);
    });
    schoolSel.disabled = schools.length === 0;
  }

  function toggleStudentFields() {
    const isStudent = document.getElementById('userType').value === 'student';
    document.getElementById('cycle-container').style.display = isStudent ? 'flex' : 'none';
    document.getElementById('cycle').required = isStudent;
    if (!isStudent) document.getElementById('cycle').value = '';
    
    document.getElementById('code-container').style.display = isStudent ? 'flex' : 'none';
    document.getElementById('studentCode').required = isStudent;
    if (!isStudent) document.getElementById('studentCode').value = '';
  }

  requireAuth();
  const user = getUser();
  if (user) {
    document.getElementById('email').value = user.email || '';
    document.getElementById('fullName').value = user.name || '';
  }

  document.getElementById('studentCode').addEventListener('input', (event) => {
    event.target.value = event.target.value.replace(/\D+/g, '').slice(0, 10);
  });

  document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    const data = {
      full_name: document.getElementById('fullName').value,
      user_type: document.getElementById('userType').value,
      faculty: document.getElementById('faculty').value,
      career: document.getElementById('school').value,
      academic_cycle: document.getElementById('cycle').value,
      student_code: document.getElementById('studentCode').value.trim(),
    };

    if (data.user_type === 'student' && data.student_code && !/^\d{1,10}$/.test(data.student_code)) {
      showToast('El codigo de estudiante debe ser numerico y tener maximo 10 digitos', 'error');
      btn.disabled = false;
      btn.innerHTML = 'Siguiente <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
      return;
    }

    const result = await AuthAPI.completeProfile(data);
    if (result && result.ok) {
      if (result.data.token) localStorage.setItem('upt_token', result.data.token);
      const updated = { ...getUser(), ...result.data.user, is_profile_complete: true };
      localStorage.setItem('upt_user', JSON.stringify(updated));
      showToast('Perfil completado correctamente');
      window.location.href = '/app.html#feed';
    } else {
      showToast(result?.data?.error || 'Error al guardar perfil', 'error');
      btn.disabled = false;
      btn.innerHTML = 'Siguiente <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
    }
  });
</script>
</body></html>
