name: monitoreorevivir
services:
  ovenmediaengine:
    image: airensoft/ovenmediaengine:latest
    container_name: monitoreorevivir-ome
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "3333:3333/tcp"
      - "3333:3333/udp"
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "8080:8080/tcp"
      - "10000:10000/udp"
      - "10001:10001/udp"
      - "10002:10002/udp"
      - "10003:10003/udp"
      - "10004:10004/udp"
      - "10005:10005/udp"
    volumes:
      - ./conf:/opt/ovenmediaengine/bin/conf
      - ./logs:/opt/ovenmediaengine/bin/logs
